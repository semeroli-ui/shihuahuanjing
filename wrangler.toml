name = "poetic-vision-ai"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[pages_build_config]
build_command = "npm run build"
destination_dir = "dist"

[vars]
# 环境变量名（请在 Cloudflare 控制台设置对应的值）
# MODEL_SCOPE_API_KEY = "..."        # ModelScope API Key (诗词解析 + TTS + 图片兜底)
# AGNES_AI_API_KEY = "..."           # Agnes AI API Key (图片生成优先)
# GEMINI_PRO_API_KEY = "..."         # (可选) Gemini Pro Key (视频生成)
# GOOGLE_AI_STUDIO_API_KEY = "..."   # (可选) Google Studio Key (视频生成 Veo)
APP_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "poetic_db"
database_id = "5e955865-c254-4cbc-b16a-2387113c629d"
